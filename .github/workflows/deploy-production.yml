name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/production_deploy_key
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run production deploy
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH || '/home/tamliteco/luxquote.app' }}
          PUBLIC_URL: ${{ secrets.PRODUCTION_URL || 'https://quote.tamlite.co.uk' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/production_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$DEPLOY_PATH' DEPLOY_BRANCH='production' PUBLIC_URL='$PUBLIC_URL' bash -s" \
            < scripts/deploy-production.sh
