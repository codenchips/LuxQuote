name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production VPS
    runs-on: [self-hosted, luxquote-production]
    environment: production

    steps:
      - name: Run production deploy
        env:
          PUBLIC_URL: ${{ secrets.PRODUCTION_URL || 'https://quote.tamlite.co.uk' }}
        run: |
          set -euo pipefail
          cd /home/runner/luxquote.app
          APP_DIR=/home/runner/luxquote.app DEPLOY_BRANCH=production PUBLIC_URL="$PUBLIC_URL" bash scripts/deploy-production.sh
